name: Frontend CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Smoke test
        run: |
          test -f index.html
          test -f config.js
          test -f static/app.js
          test -f static/styles.css
          grep -q "Sistema Escolar" index.html
      - name: JavaScript syntax
        run: node --check static/app.js
